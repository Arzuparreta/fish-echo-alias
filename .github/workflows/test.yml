name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  fish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install fish
        run: sudo apt-get update && sudo apt-get install -y fish
      - name: Run test suite
        run: fish --no-config tests/run_tests.fish
